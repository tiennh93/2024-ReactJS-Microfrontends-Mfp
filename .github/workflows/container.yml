name: deploy-container

on:
  push:
    branches:
      - main
    paths:
      - 'container/**'

defaults:
  run:
    working-directory: container

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Bước 2: Cài đặt Node.js và các dependencies
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # Bước 3: Build dự án bằng Webpack
      - name: Build Project
        env:
          PRODUCTION_MARKETING_DOMAIN: ${{ secrets.PRODUCTION_MARKETING_DOMAIN }}
          PRODUCTION_AUTH_DOMAIN: ${{ secrets.PRODUCTION_AUTH_DOMAIN }}
        run: npm run build

      # Bước 4: Cài đặt Vercel CLI
      - name: Install Vercel CLI
        run: npm install -g vercel@canary

      # Bước 5: Kiểm tra VERCEL_TOKEN (ẩn phần lớn giá trị)
      - name: Debug VERCEL_TOKEN
        run: |
          echo "VERCEL_TOKEN starts with: ${VERCEL_TOKEN:0:5}*****"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Bước 6: Pull thông tin môi trường từ Vercel (nếu cần thiết)
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Bước 7: Build lại dự án cho Vercel
      - name: Build Project for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Bước 8: Deploy project artifacts to Vercel
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
